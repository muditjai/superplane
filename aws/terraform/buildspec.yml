version: 0.2

phases:
  pre_build:
    commands:
      - cd aws
      - npm install -w @superplane/shared
      - npm run build -w @superplane/shared
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - cd lambda/s3-upload-trigger && npm install && npm run build && cd ../..
      - cd lambda/sns-to-analytics && npm install && npm run build && cd ../..
  build:
    commands:
      - docker build -f nginx/Dockerfile.app -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/superplane-app:$IMAGE_TAG --build-arg VITE_API_BASE_URL= .
      - |
        for svc in storage-service search-service upload-redaction-service payment-service analytics-service; do
          docker build -f services/$svc/Dockerfile -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/superplane-$svc:$IMAGE_TAG .
        done
      - |
        for repo in app storage-service search-service upload-redaction-service payment-service analytics-service; do
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/superplane-$repo:$IMAGE_TAG
        done
  post_build:
    commands:
      - aws ecs update-service --cluster $ECS_CLUSTER --service superplane-app --force-new-deployment --region $AWS_REGION
